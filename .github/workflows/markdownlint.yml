name: markdownlint

on:
  pull_request:
    paths:
      - '**.md'
      - '.github/workflows/markdownlint.yml'
      - '.markdownlint.json'
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.github/workflows/markdownlint.yml'
      - '.markdownlint.json'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            CLAUDE.md
            agent_docs/**/*.md
